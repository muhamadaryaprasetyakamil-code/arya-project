<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhamad Arya Prasetya Kamil | Portofolio PKL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
    
    <style>
        /* RESET & VARIABEL UTAMA (TEMA BIRU NEON) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        :root {
            --bg-dark: #060b18;          
            --bg-card: rgba(15, 23, 42, 0.6); 
            --blue-neon: #00d2ff;        
            --blue-glow: #0066ff;        
            --text-main: #f1f5f9;        
            --text-muted: #94a3b8;       
            --border-glass: rgba(0, 210, 255, 0.15);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 60px;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 102, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 210, 255, 0.08) 0%, transparent 40%);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            color: var(--blue-neon);
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        /* HEADER / HERO SECTION */
        .hero-section {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 60px 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            margin-top: 40px;
            margin-bottom: 50px;
            position: relative;
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--blue-neon);
            box-shadow: 0 0 25px var(--blue-glow);
            margin-bottom: 25px;
        }

        .hero-section h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #ffffff;
        }

        /* TYPING EFFECT */
        .typing-container {
            font-size: 1.2rem;
            color: var(--blue-neon);
            font-weight: 600;
            min-height: 30px;
            margin-bottom: 20px;
        }

        .hero-section .bio {
            max-width: 650px;
            margin: 0 auto;
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.7;
        }

        /* SKILLS SECTION (GRID STYLE) */
        .skills-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .skill-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .skill-card:hover {
            transform: translateY(-5px);
            border-color: var(--blue-neon);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.1);
        }

        .skill-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .skill-card h3 {
            font-size: 1.15rem;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .skill-card p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* PROJECTS SECTION */
        .project-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .project-link {
            text-decoration: none;
            color: inherit;
        }

        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            height: 100%;
        }

        .project-card:hover {
            transform: translateY(-5px);
            border-color: var(--blue-neon);
            box-shadow: 0 15px 30px rgba(0, 102, 255, 0.15);
        }

        .project-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 1px solid var(--border-glass);
        }

        .project-card h3 {
            padding: 20px 20px 5px 20px;
            font-size: 1.2rem;
            color: #ffffff;
        }

        .project-card p {
            padding: 0 20px 20px 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* CERTIFICATES SECTION */
        .cert-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .cert-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .cert-card:hover {
            border-color: var(--blue-neon);
            transform: translateY(-5px);
        }

        .cert-card img {
            width: 100%;
            height: 190px;
            object-fit: contain;
            background: #ffffff;
            padding: 10px;
        }

        .cert-info {
            padding: 15px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .cert-info h3 {
            font-size: 1rem;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .cert-info a {
            color: var(--blue-neon);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* GOALS SECTION */
        .goals-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
