<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio - Muhamad Arya Prasetya Kamil</title>
    <style>
        /* CSS RESET & VARIABEL WARNA */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a; /* Warna latar belakang gelap modern */
            color: #f8fafc;
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* BANNER PROFIL UTAMA */
        .profile-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 50px;
        }

        .profile-img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #38bdf8; /* Aksen warna biru muda */
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.05) rotate(3deg);
        }

        .profile-card h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .profile-card p {
            font-size: 1.2rem;
            color: #38bdf8;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* BAGIAN JUDUL SERTIFIKAT */
        .section-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 30px;
            text-align: center;
            position: relative;
            color: #f1f5f9;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background-color: #38bdf8;
            margin: 10px auto 0 auto;
            border-radius: 2px;
        }

        /* GRID TATA LETAK SERTIFIKAT */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        /* GAYA CARD SERTIFIKAT */
        .cert-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .cert-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(56, 189, 248, 0.15);
            border-color: #475569;
        }
